<!DOCTYPE html>
<html lang="$site_lang">
  <head>
    <title>$page_title</title>
    <meta name="description" content="$meta_description">

    <meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no">
    <link rel="canonical" href="$canonical_url">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="/assets/site.css">

    <meta name="twitter:title" content="$page_title">
    <meta name="twitter:description" content="$meta_description">
    <meta property="og:url" content="$canonical_url">
    <meta property="og:type" content="$og_type">
    <meta property="og:title" content="$page_title">
    <meta property="og:description" content="$meta_description">
$social_image
$json_ld

    <div class="viewport">
      <div class="viewport-top">
        <header class="site-head">
          <div class="site-head-pattern" aria-hidden="true"></div>
          <div class="container">
            <div class="site-mast">
              <div class="site-mast-right">
                <span class="site-mast-tagline">$site_title</span>
              </div>
            </div>
            <nav class="site-nav">
              <div class="site-nav-left">
                <a class="site-nav-item" href="/" aria-label="Home"$home_attr><svg class="site-icon" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M12 3.25 3 10.5v10.25h6.75v-6.5h4.5v6.5H21V10.5l-9-7.25Zm7.5 16h-3.75v-6.5h-7.5v6.5H4.5v-8l7.5-6.03 7.5 6.03v8Z"></path></svg></a>

              </div>
            </nav>
          </div>
        </header>
        <main class="site-main">
          <div class="container">
$main_content
          </div>
        </main>
      </div>
      <div class="viewport-bottom">
        <footer class="site-foot">
          <div class="site-foot-pattern" aria-hidden="true"></div>
          <div class="site-foot-nav container">
            <div class="site-foot-nav-center">
              <svg class="site-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M12 2.75 4.5 6v5.12c0 4.83 3.14 9.34 7.5 10.63 4.36-1.29 7.5-5.8 7.5-10.63V6L12 2.75Zm0 17.42c-3.53-1.2-6-4.98-6-9.05v-4.1L12 4.4l6 2.62v4.1c0 4.07-2.47 7.85-6 9.05Zm-1.41-4.12-2.47-2.47 1.06-1.06 1.41 1.41 4.3-4.3 1.06 1.06-5.36 5.36Z"></path></svg>

            </div>
          </div>

      </div>
    </div>

</html>
